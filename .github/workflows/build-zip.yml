name: Build Theme ZIP

on:
  push:
    branches:
      - website/kreisler
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    name: Build Theme and Create ZIP
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build theme
        run: npm run build

      - name: Sanitize branch name
        id: branch-name
        run: |
          # Remove "website/" prefix if present, otherwise use branch name as-is
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's|^website/||')
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create ZIP file
        id: create-zip
        run: |
          # Get theme name from style.css or use default
          THEME_NAME=$(grep -i "Theme Name:" style.css 2>/dev/null | cut -d: -f2 | xargs || echo "boilerplate-tibo")
          THEME_NAME_CLEAN=$(echo "$THEME_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g')
          VERSION=$(grep -i "Version:" style.css 2>/dev/null | cut -d: -f2 | xargs || echo "1.0.0")
          
          # Create folder name matching the ZIP filename (without .zip extension)
          FOLDER_NAME="${THEME_NAME_CLEAN}-${VERSION}"
          mkdir -p "$FOLDER_NAME"
          
          # Copy all tracked files (these are not gitignored)
          git ls-files -z | xargs -0 -I {} sh -c "
            mkdir -p \"$FOLDER_NAME/\$(dirname \"{}\")\"
            cp -r \"{}\" \"$FOLDER_NAME/{}\" 2>/dev/null || true
          "
          
          # Include the dist folder (built assets) even though it's gitignored
          if [ -d "dist" ]; then
            cp -r dist "$FOLDER_NAME/dist"
          fi
          
          # Remove any git-related files from the package
          find "$FOLDER_NAME" -name ".git*" -delete 2>/dev/null || true
          rm -rf "$FOLDER_NAME/.github" 2>/dev/null || true
          
          # Create ZIP file containing the folder
          ZIP_FILENAME="${FOLDER_NAME}.zip"
          zip -r "$ZIP_FILENAME" "$FOLDER_NAME" -q
          
          echo "zip_file=$ZIP_FILENAME" >> $GITHUB_OUTPUT
          echo "Created ZIP: $ZIP_FILENAME"
          ls -lh "$ZIP_FILENAME"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.branch-name.outputs.branch }}
          path: ${{ steps.create-zip.outputs.zip_file }}
          retention-days: 30
