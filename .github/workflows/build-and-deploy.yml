name: Build and Deploy Theme

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Build theme
        run: npm run build

      - name: Create deployment artifact
        run: |
          # Create zip file excluding development files
          zip -r theme-deployment.zip . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".env*" \
            -x ".DS_Store" \
            -x ".vscode/*" \
            -x ".idea/*" \
            -x "*.md" \
            -x "package*.json" \
            -x "vite.config.js" \
            -x "postcss.config.js" \
            -x "tailwind.config.js" \
            -x "build-config.js" \
            -x "vite-plugin-flynt.js" \
            -x "phpcs.xml.dist" \
            -x "composer.json" \
            -x "composer.lock"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme-build
          path: theme-deployment.zip
          retention-days: 30

